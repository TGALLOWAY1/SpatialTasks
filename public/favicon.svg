<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark navy background -->
  <rect width="512" height="512" rx="112" fill="#0a0a1f"/>

  <!-- Rounded checkbox outline (open at top-right for the dot) -->
  <path d="M 342 146
           L 200 146
           Q 146 146 146 200
           L 146 342
           Q 146 396 200 396
           L 342 396
           Q 396 396 396 342
           L 396 240"
        fill="none"
        stroke="#7C5CFF"
        stroke-width="34"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Check mark -->
  <path d="M 204 272
           L 248 316
           L 330 224"
        fill="none"
        stroke="#7C5CFF"
        stroke-width="34"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Notification dot -->
  <circle cx="396" cy="150" r="30" fill="#8B5CFF"/>
</svg>
